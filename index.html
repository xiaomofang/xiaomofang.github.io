<!DOCTYPE html>
<html lang="zh-CN" data-theme="night" class="no-transition">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("yichuan-theme");
        var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "night" : "day");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    })();
  </script>
  <style>
    html[data-theme="night"] { background: #0c0c0c; color: #ededed; }
    html[data-theme="day"] { background: #ffffff; color: #1a1a1a; }
  </style>
  <title>MOFANG's Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="LLM notes — understanding, one question at a time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css?v=33" />
</head>
<body class="home-page">
  <div class="ambient" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
  </div>
  <canvas id="star-canvas"></canvas>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-dot"></span>
        <span class="logo-text">MOFANG</span>
      </a>
      <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <main class="site-main">
    <section class="hero">
      <div class="hero-slogan">
        <h1 class="blog-title">
          <span class="blog-title-brand">
            <picture>
              <source srcset="assets/tiger-mascot.webp" type="image/webp" />
              <img src="assets/tiger-mascot.png" alt="" class="brand-mascot brand-mascot--hero" width="128" height="85" decoding="async" />
            </picture>
            <span class="blog-title-text">MOFANG's Blog</span>
          </span>
        </h1>
        <p class="slogan-primary">Understanding, One Question at a Time</p>
        <p class="slogan-secondary">Every answer reveals a deeper question.</p>
      </div>
    </section>

    <div class="controls">
      <nav id="tags" class="tag-cloud" aria-label="Categories">
        <button class="tag-pill active" data-category="all" type="button">All</button>
        <button class="tag-pill" data-category="basic" type="button">Basic Knowledge</button>
        <button class="tag-pill" data-category="inference" type="button">Inference</button>
        <button class="tag-pill" data-category="rl" type="button">Reinforcement Learning</button>
        <button class="tag-pill" data-category="training" type="button">Training</button>
        <button class="tag-pill" data-category="hardware-kernels" type="button">Hardware & Kernels</button>
      </nav>
      <div class="search-box">
        <input id="search-input" type="search" placeholder="Search…" autocomplete="off" />
      </div>
    </div>

    <section id="blog" class="section">
      <div class="post-list" id="post-list">
        <article class="post-card" data-category="inference" data-date="2026-06-08" data-title="Temperature=0 不等于确定性：从解码策略到 Batch Invariance">
          <a href="posts/inference/temperature-zero-determinism.html" class="post-card-link">
            <div class="post-meta-row">
              <time class="post-date" datetime="2026-06-08">Jun 08</time>
              <span class="post-tag">Inference</span>
            </div>
            <h3 class="post-title">Temperature=0 不等于确定性：从解码策略到 Batch Invariance</h3>
            <p class="post-excerpt">
              从 logits、argmax、dynamic batching 到 MoE 与 RL 训练：确定性不是采样参数，而是系统属性。
            </p>
          </a>
        </article>
      </div>

      <p class="empty-state hidden" id="empty-state">No matching notes.</p>
    </section>
  </main>

  <footer class="site-footer">
    <span class="footer-credit">
      <span class="footer-prefix">© 2026 by</span>
      <a href="index.html" class="footer-brand">
        <picture>
          <source srcset="assets/tiger-mascot.webp" type="image/webp" />
          <img src="assets/tiger-mascot.png" alt="" class="brand-mascot brand-mascot--inline" width="27" height="18" decoding="async" />
        </picture>
        <span>MOFANG</span>
      </a>
    </span>
  </footer>

  <script src="app.js?v=33"></script>
</body>
</html>
