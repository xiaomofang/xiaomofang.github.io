      <section class="post-page-content">
        <p>
          大模型对齐的核心问题是：如何让模型的输出更符合人类偏好？
          RLHF 和 DPO 给出了两种截然不同的思路。
        </p>

        <h2>RLHF</h2>
        <p>
          训练奖励模型 → 用 PPO 优化策略。
          链路长、不稳定，但灵活度高，可以处理复杂的偏好结构。
        </p>

        <h2>DPO</h2>
        <p>
          直接用偏好数据优化，跳过奖励模型和 RL 循环。
          更简洁、更稳定，但表达能力有一定局限。
        </p>

        <h2>追问</h2>
        <p>
          DPO 本质上在优化什么目标函数？它和 RLHF 的 KL 约束有什么关系？
          理解了这一点，才能判断什么时候该用哪条路。
        </p>
      </section>
